spring.application.name=modlab
server.port=8080

# PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.org.springframework=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

# JWT (usa variables de entorno en Render)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}              # Ejemplo: 3600000 (1 hora en milisegundos)
jwt.expiration.refresh=${JWT_EXPIRATION_REFRESH}  # Ejemplo: 604800000 (7 días en milisegundos)